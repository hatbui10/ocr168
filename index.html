<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR VN168 V2 - Fix Quét</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        /* GIỮ NGUYÊN CẤU TRÚC - CHỈ ĐỔI MÀU DARKMODE */
        :root { --primary: #ff5c5c; --secondary: #27ae60; --bg: #0f0f0f; --text: #e0e0e0; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 900px; margin: auto; background: #1a1a1a; padding: 20px; border-radius: 10px; border: 1px solid #333; }
        h2 { text-align: center; color: var(--primary); }
        .upload-box { border: 2px dashed #444; padding: 30px; text-align: center; cursor: pointer; margin-bottom: 20px; background: #222; }
        .progress { height: 10px; background: #333; border-radius: 5px; margin: 15px 0; display: none; }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; border-radius: 5px; }
        .btns { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-dl { background: var(--secondary); color: white; }
        
        .output-box { margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; color: #888; font-size: 14px; }
        
        /* TEXTAREA 2: CỐ ĐỊNH CHIỀU CAO & CÓ THANH CUỘN */
        #txtHorizontal { 
            width: 100%; 
            height: 100px; 
            padding: 10px; 
            border: 1px solid #333; 
            border-radius: 5px; 
            font-family: monospace; 
            font-size: 18px; 
            box-sizing: border-box;
            background: #000;
            color: #00ff41;
            font-weight: bold;
            overflow-y: scroll; 
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        table { width: 100%; border-collapse: collapse; }
        th { background: var(--primary); color: white; padding: 10px; }
        td { padding: 8px; text-align: center; border-bottom: 1px solid #333; font-family: monospace; }
        .txt-lon { color: #ff5c5c; font-weight: bold; }
        .txt-nho { color: #3498db; font-weight: bold; }
        #canvas-helper { display: none; } 
    </style>
</head>
<body>

<div class="container">
    <h2>Hệ Thống Quét VN168 (Bản Fix Lỗi)</h2>
    
    <div class="upload-box" onclick="document.getElementById('fileInput').click()">
        Click để chọn ảnh (Bản chuẩn)
        <input type="file" id="fileInput" multiple accept="image/*" style="display: none;">
    </div>

    <div class="progress" id="progressBox"><div class="progress-bar" id="progressBar"></div></div>
    <div id="status" style="text-align:center; margin-bottom:10px;"></div>

    <div class="btns">
        <button id="downloadBtn" class="btn-dl" disabled>Tải Dãy Số (.txt)</button>
        <button onclick="location.reload()" style="background:#444; color:white;">Xóa làm lại</button>
    </div>

    <div class="output-box">
        <label>Dãy số hàng ngang (Cũ nhất -> Mới nhất):</label>
        <textarea id="txtHorizontal" placeholder="Kết quả hàng ngang..." readonly></textarea>
    </div>

    <table>
        <thead>
            <tr>
                <th>Kỳ xổ</th>
                <th>Con số</th>
                <th>Lớn nhỏ</th>
            </tr>
        </thead>
        <tbody id="resultBody"></tbody>
    </table>
</div>

<canvas id="canvas-helper"></canvas>

<script>
    const fileInput = document.getElementById('fileInput');
    const resultBody = document.getElementById('resultBody');
    const txtHorizontal = document.getElementById('txtHorizontal');
    const progressBar = document.getElementById('progressBar');
    const progressBox = document.getElementById('progressBox');
    const status = document.getElementById('status');
    const downloadBtn = document.getElementById('downloadBtn');
    const canvas = document.getElementById('canvas-helper');
    const ctx = canvas.getContext('2d');

    let finalData = [];

    fileInput.addEventListener('change', async (e) => {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;

        progressBox.style.display = 'block';
        resultBody.innerHTML = "";
        txtHorizontal.value = "";
        finalData = [];

        // GIỮ NGUYÊN BỘ QUÉT GỐC CỦA BẠN ĐỂ ĐẢM BẢO CHẠY
        const worker = await Tesseract.createWorker();
        await worker.loadLanguage('eng+vie');
        await worker.initialize('eng+vie');

        for (let i = 0; i < files.length; i++) {
            status.innerText = `Đang xử lý: ${i+1}/${files.length}`;
            progressBar.style.width = ((i+1)/files.length)*100 + '%';

            const processedImage = await preprocessImage(files[i]);
            const { data: { text } } = await worker.recognize(processedImage);
            parseText(text);
        }

        await worker.terminate();

        finalData.sort((a, b) => b.kyXo.localeCompare(a.kyXo));
        
        renderTable(); 
        updateHorizontalData(); 

        status.innerText = `✅ Hoàn tất quét ${finalData.length} kỳ!`;
        downloadBtn.disabled = false;
    });

    function preprocessImage(file) {
        return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                // GIỮ NGUYÊN BỘ LỌC CỦA BẠN
                ctx.filter = 'grayscale(130%) contrast(100%)';
                ctx.drawImage(img, 0, 0);
                resolve(canvas.toDataURL('image/jpeg', 0.9));
            };
            img.src = URL.createObjectURL(file);
        });
    }

    function parseText(text) {
        const lines = text.split('\n');
        lines.forEach(line => {
            const kyXoMatch = line.match(/\d{10,}/);
            if (kyXoMatch) {
                const kyXo = kyXoMatch[0];
                const sauKyXo = line.split(kyXo)[1] || "";
                const numMatch = sauKyXo.match(/\d/);
                
                if (numMatch) {
                    const conSo = parseInt(numMatch[0]);
                    
                    // SỬA LOGIC LỚN NHỎ: 5-9 Lớn, 0-4 Nhỏ
                    let lonNho = (conSo >= 5) ? "Lớn" : "Nhỏ";

                    if(!finalData.some(item => item.kyXo === kyXo)) {
                        finalData.push({kyXo, conSo, lonNho});
                    }
                }
            }
        });
    }

    function renderTable() {
        resultBody.innerHTML = "";
        finalData.forEach(d => {
            const colorClass = (d.lonNho === "Lớn") ? "txt-lon" : "txt-nho";
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${d.kyXo}</td><td style="color:red;font-weight:bold;font-size:18px;">${d.conSo}</td><td class="${colorClass}">${d.lonNho}</td>`;
            resultBody.appendChild(tr);
        });
    }

    function updateHorizontalData() {
        const sortedData = [...finalData].sort((a, b) => a.kyXo.localeCompare(b.kyXo));
        const rowData = sortedData.map(item => item.conSo).join(" ");
        txtHorizontal.value = rowData;
        txtHorizontal.scrollTop = txtHorizontal.scrollHeight;
    }

    // SỬA NÚT TẢI: Chỉ lấy dãy số hàng ngang
    downloadBtn.addEventListener('click', () => {
        const content = txtHorizontal.value;
        const blob = new Blob([content], {type: 'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `day_so_${Date.now()}.txt`;
        a.click();
    });
</script>
</body>
</html>
