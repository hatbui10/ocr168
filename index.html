<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nhập 0/1 và tính kết quả</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: #fff;
    }

    .card {
      background: rgba(255, 255, 255, 0.95);
      color: #222;
      padding: 24px 28px 28px;
      border-radius: 16px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.25);
      max-width: 420px;
      width: 100%;
    }

    .title {
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .subtitle {
      text-align: center;
      font-size: 13px;
      color: #666;
      margin-bottom: 20px;
    }

    .row-label {
      font-size: 13px;
      margin-bottom: 4px;
      color: #555;
    }

    .boxes-row {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
      justify-content: center;
    }

    .box {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      border: 1px solid #d0d7de;
      text-align: center;
      font-size: 22px;
      font-weight: 600;
      outline: none;
      transition: all 0.18s ease;
      background: #f8fafc;
      color: #111827;
    }

    .box[readonly] {
      background: #f1f5f9;
    }

    .box:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.25);
      background: #ffffff;
    }

    .box.result {
      background: #ecfdf5;
      border-color: #bbf7d0;
      color: #166534;
    }

    .input-section {
      margin-top: 10px;
      text-align: center;
    }

    .input-label {
      font-size: 13px;
      margin-bottom: 6px;
      color: #444;
    }

    #box6 {
      width: 80px;
      height: 44px;
      border-radius: 999px;
      border: 1px solid #d0d7de;
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      outline: none;
      transition: all 0.18s ease;
      background: #eef2ff;
      color: #1e293b;
    }

    #box6:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.25);
      background: #e0e7ff;
    }

    #box6:disabled {
      background: #e5e7eb;
      color: #6b7280;
      cursor: not-allowed;
    }

    .status {
      margin-top: 10px;
      text-align: center;
      font-size: 12px;
      color: #6b7280;
      min-height: 16px;
    }

    .status.working {
      color: #d97706;
    }

    .status.done {
      color: #15803d;
    }

    .reset-btn {
      display: none;
      margin: 16px auto 0;
      padding: 10px 24px;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: #fff;
      border: none;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
    }

    .reset-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(79, 70, 229, 0.4);
    }

    .reset-btn:active {
      transform: translateY(0);
    }

    .reset-btn.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">Chuỗi 0/1 &amp; Kết quả</div>
    <div class="subtitle">
      Nhập lần lượt 5 lần số 0 hoặc 1, sau đó hệ thống tự tính và hiển thị kết quả.
    </div>

    <!-- Hàng 5 ô đang dịch trái -->
    <div class="row-label">Chuỗi nhập:</div>
    <div class="boxes-row">
      <input id="box1" class="box" type="text" readonly />
      <input id="box2" class="box" type="text" readonly />
      <input id="box3" class="box" type="text" readonly />
      <input id="box4" class="box" type="text" readonly />
      <input id="box5" class="box" type="text" readonly />
    </div>

    <!-- Hàng 5 ô kết quả -->
    <div class="row-label">Hãy sử dụng dãy sau:</div>
    <div class="boxes-row">
      <input id="r1" class="box result" type="text" readonly />
      <input id="r2" class="box result" type="text" readonly />
      <input id="r3" class="box result" type="text" readonly />
      <input id="r4" class="box result" type="text" readonly />
      <input id="r5" class="box result" type="text" readonly />
    </div>

    <!-- Ô nhập thứ 6 -->
    <div class="input-section">
      <div class="input-label">Nhập từng số 0 hoặc 1 vào ô dưới (tổng cộng 5 lần):</div>
      <input
        id="box6"
        type="tel"
        inputmode="numeric"
        pattern="[01]"
        maxlength="1"
        autocomplete="off"
        
      />
    </div>

    <div id="status" class="status"></div>

    <!-- Nút Reset -->
    <button id="resetBtn" class="reset-btn">🔄 Nhập lại từ đầu</button>
  </div>

  <script>
    const displayBoxes = [
      document.getElementById('box1'),
      document.getElementById('box2'),
      document.getElementById('box3'),
      document.getElementById('box4'),
      document.getElementById('box5')
    ];

    const resultBoxes = [
      document.getElementById('r1'),
      document.getElementById('r2'),
      document.getElementById('r3'),
      document.getElementById('r4'),
      document.getElementById('r5')
    ];

    const inputBox = document.getElementById('box6');
    const statusEl = document.getElementById('status');
    const resetBtn = document.getElementById('resetBtn');

    let current = ['', '', '', '', ''];
    let inputCount = 0;
    let locked = false;

    function renderDisplay() {
      current.forEach((v, i) => {
        displayBoxes[i].value = v;
      });
    }

    function renderResult(pattern) {
      for (let i = 0; i < 5; i++) {
        resultBoxes[i].value = pattern ? pattern[i] : '';
      }
    }

    function resetAll() {
      current = ['', '', '', '', ''];
      inputCount = 0;
      locked = false;
      inputBox.disabled = false;
      inputBox.value = '';
      renderDisplay();
      renderResult('');
      statusEl.textContent = '';
      statusEl.className = 'status';
      resetBtn.classList.remove('show');
      inputBox.focus();
    }

    // Chặn phím không phải 0 hoặc 1
    inputBox.addEventListener('keydown', (e) => {
      if (locked) {
        e.preventDefault();
        return;
      }
      const allowedKeys = ['0', '1', 'Backspace', 'Delete', 'ArrowLeft', 'ArrowRight', 'Tab'];
      if (!allowedKeys.includes(e.key)) {
        e.preventDefault();
      }
    });

    inputBox.addEventListener('input', () => {
      if (locked) {
        inputBox.value = '';
        return;
      }

      const val = inputBox.value.trim();

      // Chỉ chấp nhận 0 hoặc 1
      if (val !== '0' && val !== '1') {
        inputBox.value = '';
        return;
      }

      // Ghi nhận 1 lần nhập hợp lệ
      inputCount++;

      // Dịch trái mảng current (5 ô), rồi push giá trị mới vào cuối
      current.shift();
      current.push(val);
      renderDisplay();

      // Xóa ô nhập cho lần tiếp theo
      inputBox.value = '';

      // Nếu chưa đủ 5 lần thì tiếp tục cho nhập
      if (inputCount < 5) {
        statusEl.textContent = `Đã nhập ${inputCount}/5 lần. Tiếp tục nhập…`;
        statusEl.className = 'status';
        inputBox.focus();
        return;
      }

      // Đủ 5 lần → khóa input, chờ 1s rồi tính tổng
      locked = true;
      inputBox.disabled = true;
      statusEl.textContent = 'Đủ 5 lần. Đang tính toán…';
      statusEl.className = 'status working';

      setTimeout(() => {
        // Tính tổng số bit 1 trong 5 ô
        const sum = current.reduce((acc, v) => acc + (v === '1' ? 1 : 0), 0);

        // Nếu tổng >= 3 → 00101, ngược lại → 11010
        const resultPattern = sum >= 3 ? '00101' : '11010';
        renderResult(resultPattern);

        statusEl.textContent = `Hoàn tất. Tổng số bit 1 là ${sum}.`;
        statusEl.className = 'status done';

        // Hiện nút Reset và tự động focus vào ô 6
        resetBtn.classList.add('show');
        inputBox.focus();
      }, 1000);
    });

    // Xử lý nút Reset
    resetBtn.addEventListener('click', resetAll);

    // Khởi tạo khi load trang
    window.addEventListener('load', () => {
      renderDisplay();
      renderResult('');
      inputBox.focus();
    });
  </script>
</body>
</html>
