<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCR 150 Ảnh - 4 Dãy Mỗi Dòng</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<style>
  body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #e0e0e0; padding: 20px; max-width: 900px; margin: auto; }
  .card { background: #1e1e1e; padding: 25px; border-radius: 15px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  h2 { color: #4caf50; text-align: center; margin-top: 0; }
  .input-group { margin: 20px 0; }
  input[type="file"] { background: #2d2d2d; padding: 12px; border-radius: 8px; width: 100%; color: #fff; cursor: pointer; border: 1px dashed #555; }
  button { width: 100%; padding: 15px; border-radius: 8px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; }
  #btnRun { background: #4caf50; color: white; margin-bottom: 10px; }
  #btnRun:hover { background: #45a049; }
  #btnRun:disabled { background: #3d3d3d; color: #777; cursor: not-allowed; }
  #btnDownload { background: #2196F3; color: white; }
  textarea { 
    width: 100%; height: 350px; margin-top: 20px; background: #000; color: #00ff41; 
    border: 1px solid #333; padding: 15px; font-family: 'Courier New', monospace; 
    font-size: 17px; box-sizing: border-box; border-radius: 8px; line-height: 1.6;
  }
  .progress-container { margin: 20px 0; display: none; }
  .progress-bar { height: 12px; background: #333; border-radius: 6px; overflow: hidden; }
  #progressFill { width: 0%; height: 100%; background: linear-gradient(90deg, #4caf50, #8bc34a); transition: width 0.3s; }
  #status { text-align: center; margin-top: 10px; font-weight: bold; color: #ffeb3b; }
</style>
</head>
<body>

<div class="card">
  <h2>Quét VN168 Hàng Loạt (4 Dãy/Dòng)</h2>
  
  <div class="input-group">
    <label>Chọn tối đa 150 ảnh:</label>
    <input type="file" id="upload" multiple accept="image/*">
  </div>
  
  <button id="btnRun" onclick="processImages()">BẮT ĐẦU XỬ LÝ</button>
  
  <div class="progress-container" id="progressCont">
    <div class="progress-bar"><div id="progressFill"></div></div>
    <div id="status">Sẵn sàng quét...</div>
  </div>

  <textarea id="output" readonly placeholder="Kết quả: 4 dãy 10 số trên mỗi dòng sẽ hiện ở đây..."></textarea>
  
  <button id="btnDownload" onclick="downloadTxt()">TẢI FILE KẾT QUẢ (.TXT)</button>
</div>

<script>
let worker = null;

async function initWorker() {
  if (!worker) {
    worker = await Tesseract.createWorker();
    await worker.loadLanguage('eng');
    await worker.initialize('eng');
    await worker.setParameters({ tessedit_char_whitelist: '0123456789' });
  }
}

function cropTarget(img) {
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");
  // Tọa độ tối ưu cho cột số ở giữa
  const x = img.width * 0.40;
  const w = img.width * 0.20;
  const y = img.height * 0.32; 
  const h = img.height * 0.52;
  canvas.width = w;
  canvas.height = h;
  ctx.drawImage(img, x, y, w, h, 0, 0, w, h);
  return canvas;
}

async function processImages() {
  const files = document.getElementById("upload").files;
  if (files.length === 0) return alert("Chưa chọn ảnh bạn ơi!");

  const btnRun = document.getElementById("btnRun");
  const output = document.getElementById("output");
  const status = document.getElementById("status");
  const progressCont = document.getElementById("progressCont");
  const progressFill = document.getElementById("progressFill");

  btnRun.disabled = true;
  progressCont.style.display = "block";
  output.value = "";
  
  await initWorker();

  let allResults = [];

  for (let i = 0; i < files.length; i++) {
    const percent = Math.round(((i + 1) / files.length) * 100);
    status.innerText = `Đang quét ảnh ${i + 1}/${files.length}...`;
    progressFill.style.width = percent + "%";

    try {
      const img = await new Promise(res => {
        const r = new FileReader();
        r.onload = e => {
          const im = new Image();
          im.onload = () => res(im);
          im.src = e.target.result;
        };
        r.readAsDataURL(files[i]);
      });

      const cropped = cropTarget(img);
      const { data: { text } } = await worker.recognize(cropped);
      let nums = text.match(/\d/g);
      
      if (nums) {
        // Lấy 10 số đầu, đảo ngược (dưới lên)
        let row = nums.slice(0, 10).reverse().join('');
        allResults.push(row);
      } else {
        allResults.push("0000000000"); // Ghi đè nếu lỗi để không lệch dòng
      }

      // Logic hiển thị 4 dãy mỗi dòng
      let displayMsg = "";
      for (let j = 0; j < allResults.length; j++) {
        displayMsg += allResults[j];
        if ((j + 1) % 4 === 0) {
          displayMsg += "\n"; // Đủ 4 dãy thì xuống dòng
        } else if (j !== allResults.length - 1) {
          displayMsg += " "; // Cách nhau 1 khoảng trắng giữa các dãy
        }
      }
      output.value = displayMsg;

    } catch (e) {
      console.error(e);
    }
  }

  status.innerText = "XONG! ĐÃ QUÉT TẤT CẢ.";
  btnRun.disabled = false;
}

function downloadTxt() {
  const text = document.getElementById("output").value;
  if (!text) return;
  const blob = new Blob([text], { type: 'text/plain' });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `VN168_Export_${Date.now()}.txt`;
  a.click();
}
</script>

</body>
</html>
