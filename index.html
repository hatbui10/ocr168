<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đọc file log & trích kết quả kỳ xổ</title>

<style>
body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: #e5e7eb;
  padding: 24px;
  min-height: 100vh;
}

/* tiêu đề */
h2 {
  margin: 0 0 14px;
  font-size: 20px;
  font-weight: 600;
}

/* nút chọn file */
.file-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 18px;
  border-radius: 12px;
  background: linear-gradient(135deg, #38bdf8, #0ea5e9);
  color: #022c22;
  font-weight: 600;
  cursor: pointer;
  user-select: none;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}

.file-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 10px 22px rgba(56,189,248,0.35);
}

.file-btn.selected {
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: #052e16;
}

/* ẩn input file gốc */
.file-btn input {
  display: none;
}

/* danh sách file */
#fileList {
  margin-top: 14px;
  padding: 0;
  list-style: none;
  max-width: 520px;
}

#fileList li {
  background: rgba(15,23,42,0.8);
  border: 1px solid rgba(148,163,184,0.15);
  border-radius: 10px;
  padding: 8px 12px;
  margin-bottom: 6px;
  cursor: grab;
  font-family: Consolas, monospace;
  font-size: 13px;
}

#fileList li.dragging {
  opacity: 0.4;
}

/* nút đọc */
button {
  margin-top: 12px;
  padding: 10px 18px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: #052e16;
  font-weight: 600;
  cursor: pointer;
}

button:hover {
  box-shadow: 0 8px 20px rgba(34,197,94,0.25);
}

/* textarea */
.wrapper {
  display: flex;
  gap: 16px;
  margin-top: 16px;
}

textarea {
  flex: 1;
  height: 360px;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid rgba(148,163,184,0.15);
  background: rgba(2,6,23,0.7);
  color: #e5e7eb;
  font-family: Consolas, monospace;
  font-size: 13px;
  resize: vertical;
}
</style>
</head>

<body>

<h2>Đọc file HTML log → kết quả kỳ xổ</h2>

<label class="file-btn" id="fileLabel">
  📂 Chọn file log
  <input type="file" id="fileInput" multiple accept=".html,.txt">
</label>

<ul id="fileList"></ul>

<button onclick="docFile()">Đọc file theo thứ tự đã sắp xếp</button>
<button onclick="exportTXT()">Xuất chuỗi 0–1 ra TXT</button>


<div class="wrapper">
  <textarea id="lines" placeholder="Ghi rõ để kiểm tra"></textarea>
  <textarea id="bits" placeholder="Chuỗi 0–1 "></textarea>
</div>

<script>
let selectedFiles = [];

/* chọn file */
document.getElementById("fileInput").addEventListener("change", e => {
  selectedFiles = Array.from(e.target.files);
  renderFileList();

  const label = document.getElementById("fileLabel");
  label.classList.add("selected");
  label.childNodes[0].textContent = `📂 Đã chọn ${selectedFiles.length} file`;
});

/* render & kéo thả */
function renderFileList() {
  const list = document.getElementById("fileList");
  list.innerHTML = "";

  selectedFiles.forEach((file, index) => {
    const li = document.createElement("li");
    li.textContent = `${index + 1}. ${file.name}`;
    li.draggable = true;

    li.addEventListener("dragstart", () => {
      li.classList.add("dragging");
      li.dataset.index = index;
    });

    li.addEventListener("dragend", () => {
      li.classList.remove("dragging");
    });

    li.addEventListener("dragover", e => e.preventDefault());

    li.addEventListener("drop", e => {
      e.preventDefault();
      const from = Number(document.querySelector(".dragging").dataset.index);
      const to = index;

      const moved = selectedFiles.splice(from, 1)[0];
      selectedFiles.splice(to, 0, moved);
      renderFileList();
    });

    list.appendChild(li);
  });
}

/* đọc file */
function readFileAsText(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.readAsText(file, "UTF-8");
  });
}

/* xử lý log */
async function docFile() {
  const linesBox = document.getElementById("lines");
  const bitsBox = document.getElementById("bits");

  linesBox.value = "";
  bitsBox.value = "";

  const regex = /Kết quả kỳ xổ\s*:\s*(\d+)\s*(LỚN|NHỎ)/g;

  let allLines = [];
  let allBits = [];

  for (const file of selectedFiles) {
    const text = await readFileAsText(file);
    let match;

    while ((match = regex.exec(text)) !== null) {
      const ky = match[1];
      const kq = match[2];

      allLines.push(`[${file.name}] Kết quả kỳ xổ : ${ky} ${kq}`);
      allBits.push(kq === "LỚN" ? "1" : "0");
    }
  }

  linesBox.value = allLines.join("\n");
  bitsBox.value = allBits.join("");
}

function exportTXT() {
  const bits = document.getElementById("bits").value.trim();
  if (!bits) return;

  const now = new Date();

  const pad = n => String(n).padStart(2, "0");
  const timeStr =
    now.getFullYear() + "-" +
    pad(now.getMonth() + 1) + "-" +
    pad(now.getDate()) + "_" +
    pad(now.getHours()) + "-" +
    pad(now.getMinutes()) + "-" +
    pad(now.getSeconds());

  const content =
`Thời gian xuất: ${now.toLocaleString("vi-VN")}
Chuỗi kết quả (LỚN=1, NHỎ=0):

${bits}
`;

  const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = `chuoi_ket_qua_${timeStr}.txt`;
  a.click();

  URL.revokeObjectURL(url);
}

</script>

</body>
</html>
