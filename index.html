<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCR- Cộng Dồn File</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<style>
  /* Tiêu chuẩn Margin 3-edge: Top 30px, Side 3px */
  body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; padding: 30px 3px 20px 3px; max-width: 1000px; margin: auto; }
  .card { background: #161616; padding: 25px; border-radius: 15px; border: 1px solid #333; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
  h2 { color: #00e676; text-align: center; text-transform: uppercase; margin-top: 0; }
  
  .input-group { margin: 20px 0; border: 1px dashed #444; padding: 15px; border-radius: 10px; background: #000; }
  input[type="file"] { width: 100%; color: #00e676; cursor: pointer; }
  
  #fileCountDisplay { color: #ffeb3b; font-weight: bold; margin-top: 10px; display: block; text-align: center; }

  .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
  @media (max-width: 768px) { .grid-container { grid-template-columns: 1fr; } }

  button { width: 100%; padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
  #btnRun { background: #00e676; color: #000; font-size: 16px; }
  #btnRun:disabled { background: #333; color: #777; }
  
  .btn-copy { background: #ff9800; color: #000; }
  #btnClear { background: #f44336; color: white; width: auto; padding: 8px 20px; display: block; margin: 10px auto; }

  label { display: block; margin-bottom: 8px; font-weight: bold; color: #aaa; font-size: 12px; }
  textarea { 
    width: 100%; height: 350px; background: #000; color: #00ff41; 
    border: 1px solid #333; padding: 15px; font-family: monospace; 
    font-size: 15px; border-radius: 8px; line-height: 1.6; resize: none;
  }
  
  #status { text-align: center; margin-top: 15px; font-weight: bold; color: #00e676; min-height: 1.5em; }
</style>
</head>
<body>

<div class="card">
  <h2>Quét VN168 Cộng Dồn File</h2>
  
  <div class="input-group">
    <label>CHỌN TỆP (CÓ THỂ CHỌN NHIỀU LẦN ĐỂ THÊM FILE):</label>
    <input type="file" id="upload" multiple accept="image/*" onchange="addFilesToList()">
    <span id="fileCountDisplay">Chưa có tệp nào được chọn</span>
  </div>
  
  <button id="btnRun" onclick="processAll()">BẮT ĐẦU QUÉT TẤT CẢ</button>
  <button id="btnClear" onclick="resetAll()">XÓA TẤT CẢ LÀM LẠI</button>
  
  <div id="status">Sẵn sàng...</div>

  <div class="grid-container">
    <div>
      <label>KẾT QUẢ PHÂN DÒNG (4 CỤM):</label>
      <textarea id="output" readonly></textarea>
      <button class="btn-copy" onclick="copyText('output')">SAO CHÉP DÒNG</button>
    </div>
    <div>
      <label>KẾT QUẢ VIẾT LIỀN:</label>
      <textarea id="output2" readonly></textarea>
      <button class="btn-copy" onclick="copyText('output2')">SAO CHÉP LIỀN</button>
    </div>
  </div>
  
  <button style="background:#2196F3; color:white; margin-top:20px" onclick="downloadTxt()">TẢI FILE .TXT</button>
</div>

<script>
let worker = null;
let allFiles = []; // Kho lưu trữ tệp cộng dồn

// Hàm này chạy mỗi khi bạn bấm "Chọn tệp"
function addFilesToList() {
  const input = document.getElementById('upload');
  const newFiles = Array.from(input.files);
  
  // Cộng dồn tệp mới vào danh sách cũ
  allFiles = [...allFiles, ...newFiles];
  
  document.getElementById('fileCountDisplay').innerText = `Tổng cộng đã chọn: ${allFiles.length} tệp`;
  document.getElementById('status').innerText = `Đã thêm ${newFiles.length} tệp mới.`;
}

function resetAll() {
  if(confirm("Xóa toàn bộ tệp và kết quả?")) {
    allFiles = [];
    document.getElementById('upload').value = "";
    document.getElementById('output').value = "";
    document.getElementById('output2').value = "";
    document.getElementById('fileCountDisplay').innerText = "Chưa có tệp nào được chọn";
    document.getElementById('status').innerText = "Đã làm sạch.";
  }
}

async function initWorker() {
  if (!worker) {
    worker = await Tesseract.createWorker();
    await worker.loadLanguage('eng');
    await worker.initialize('eng');
    await worker.setParameters({ tessedit_char_whitelist: '0123456789' });
  }
}

async function processAll() {
  if (allFiles.length === 0) return alert("Bạn chưa chọn tệp nào!");

  const btnRun = document.getElementById("btnRun");
  const status = document.getElementById("status");
  const output = document.getElementById("output");
  const output2 = document.getElementById("output2");

  btnRun.disabled = true;
  await initWorker();

  let finalNumbers = [];

  for (let i = 0; i < allFiles.length; i++) {
    status.innerText = `Đang quét tệp ${i + 1}/${allFiles.length}...`;

    try {
      const img = await new Promise(res => {
        const r = new FileReader();
        r.onload = e => {
          const im = new Image();
          im.onload = () => res(im);
          im.src = e.target.result;
        };
        r.readAsDataURL(allFiles[i]);
      });

      const cv = document.createElement("canvas");
      const ctx = cv.getContext("2d");
      cv.width = img.width * 0.20; cv.height = img.height * 0.8;
      ctx.drawImage(img, img.width * 0.40, img.height * 0.35, cv.width, cv.height, 0, 0, cv.width, cv.height);

      const { data: { text } } = await worker.recognize(cv);
      let nums = text.match(/\d/g);
      let res = nums ? nums.slice(0, 10).reverse().join('') : "0000000000";
      
      finalNumbers.push(res);

      // Cập nhật hiển thị ngay lập tức
      output2.value = finalNumbers.join('');
      let disp = "";
      for (let j = 0; j < finalNumbers.length; j++) {
        disp += finalNumbers[j] + ((j + 1) % 4 === 0 ? "\n" : "      ");
      }
      output.value = disp;

    } catch (e) {
      finalNumbers.push("0000000000");
    }
  }

  status.innerText = `✅ HOÀN THÀNH QUÉT ${allFiles.length} TỆP!`;
  btnRun.disabled = false;
}

function copyText(id) {
  const text = document.getElementById(id);
  text.select();
  document.execCommand('copy');
  alert("Đã sao chép!");
}

function downloadTxt() {
  const text = document.getElementById("output2").value;
  if (!text) return;
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([text], { type: 'text/plain' }));
  a.download = `VN168-${allFiles.length}-anh.txt`;
  a.click();
}
</script>
</body>
</html>
