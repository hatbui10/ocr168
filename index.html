<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR VN168 V2 - Chính Xác Cao</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        :root { --primary: #ff5c5c; --secondary: #27ae60; }
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--primary); }
        .upload-box { border: 2px dashed #ccc; padding: 30px; text-align: center; cursor: pointer; margin-bottom: 20px; }
        .progress { height: 10px; background: #eee; border-radius: 5px; margin: 15px 0; display: none; }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; border-radius: 5px; }
        .btns { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-dl { background: var(--secondary); color: white; }
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--primary); color: white; padding: 10px; }
        td { padding: 8px; text-align: center; border-bottom: 1px solid #eee; font-family: monospace; }
        #canvas-helper { display: none; } /* Chạy ngầm để xử lý ảnh */
    </style>
</head>
<body>

<div class="container">
    <h2>Hệ Thống Quét VN168 (Bản Cải Tiến)</h2>
    
    <div class="upload-box" onclick="document.getElementById('fileInput').click()">
        Click để chọn 100 ảnh
        <input type="file" id="fileInput" multiple accept="image/*" style="display: none;">
    </div>

    <div class="progress" id="progressBox"><div class="progress-bar" id="progressBar"></div></div>
    <div id="status" style="text-align:center; margin-bottom:10px;"></div>

    <div class="btns">
        <button id="downloadBtn" class="btn-dl" disabled>Tải .txt</button>
        <button onclick="location.reload()">Xóa làm lại</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Kỳ xổ</th>
                <th>Con số</th>
                <th>Lớn nhỏ</th>
            </tr>
        </thead>
        <tbody id="resultBody"></tbody>
    </table>
</div>

<canvas id="canvas-helper"></canvas>

<script>
    const fileInput = document.getElementById('fileInput');
    const resultBody = document.getElementById('resultBody');
    const progressBar = document.getElementById('progressBar');
    const progressBox = document.getElementById('progressBox');
    const status = document.getElementById('status');
    const downloadBtn = document.getElementById('downloadBtn');
    const canvas = document.getElementById('canvas-helper');
    const ctx = canvas.getContext('2d');

    let finalData = [];

    fileInput.addEventListener('change', async (e) => {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;

        progressBox.style.display = 'block';
        resultBody.innerHTML = "";
        finalData = [];

        const worker = await Tesseract.createWorker();
        await worker.loadLanguage('eng+vie');
        await worker.initialize('eng+vie');

        for (let i = 0; i < files.length; i++) {
            status.innerText = `Đang xử lý: ${i+1}/${files.length}`;
            progressBar.style.width = ((i+1)/files.length)*100 + '%';

            const processedImage = await preprocessImage(files[i]);
            const { data: { text } } = await worker.recognize(processedImage);
            parseText(text);
        }

        await worker.terminate();

        // --- BỔ SUNG: Sắp xếp dữ liệu từ lớn đến bé trước khi hiển thị ---
        finalData.sort((a, b) => b.kyXo.localeCompare(a.kyXo));
        renderTable(); 

        status.innerText = "✅ Hoàn tất!";
        downloadBtn.disabled = false;
    });

    function preprocessImage(file) {
        return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.filter = 'grayscale(100%) contrast(150%)';
                ctx.drawImage(img, 0, 0);
                resolve(canvas.toDataURL('image/jpeg', 0.9));
            };
            img.src = URL.createObjectURL(file);
        });
    }

    function parseText(text) {
        const lines = text.split('\n');
        lines.forEach(line => {
            const kyXoMatch = line.match(/\d{10,}/);
            if (kyXoMatch) {
                const kyXo = kyXoMatch[0];
                const sauKyXo = line.split(kyXo)[1] || "";
                const numMatch = sauKyXo.match(/\d/);
                const conSo = numMatch ? numMatch[0] : "?";

                let lonNho = "?";
                if (line.toLowerCase().includes('l') || line.toLowerCase().includes('ớ')) lonNho = "Lớn";
                if (line.toLowerCase().includes('n') || line.toLowerCase().includes('h')) lonNho = "Nhỏ";

                // Kiểm tra trùng để tránh lặp dữ liệu khi quét nhiều ảnh cùng lúc
                if(!finalData.some(item => item.kyXo === kyXo)) {
                    finalData.push({kyXo, conSo, lonNho});
                }
            }
        });
    }

    // --- BỔ SUNG: Hàm render bảng để hiển thị dữ liệu sau khi sắp xếp ---
    function renderTable() {
        resultBody.innerHTML = "";
        finalData.forEach(d => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${d.kyXo}</td><td style="color:red;font-weight:bold">${d.conSo}</td><td>${d.lonNho}</td>`;
            resultBody.appendChild(tr);
        });
    }

    downloadBtn.addEventListener('click', () => {
        let txt = "Kỳ xổ\tSố\tLớn Nhỏ\n";
        // File TXT cũng sẽ tuân theo thứ tự đã sắp xếp
        finalData.forEach(d => txt += `${d.kyXo}\t${d.conSo}\t${d.lonNho}\n`);
        const blob = new Blob([txt], {type: 'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `ketqua_${Date.now()}.txt`;
        a.click();
    });
</script>
</body>
</html>
