<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCR auto cột số</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body {
  font-family: sans-serif;
  background: #111;
  color: #fff;
  padding: 20px;
}

input, button, textarea {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button {
  background: #2196f3;
  color: #fff;
  cursor: pointer;
}

textarea {
  height: 250px;
}
</style>
</head>

<body>

<h3>OCR tự tìm cột số (chuẩn cao)</h3>

<input type="file" id="upload" multiple accept="image/*">
<button onclick="runOCR()">Chạy OCR</button>

<textarea id="output"></textarea>

<button onclick="downloadTxt()">Xuất TXT</button>

<script>

// load ảnh
function loadImage(file) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.src = URL.createObjectURL(file);
  });
}

// SMART CROP cột số
function cropMiddle(img) {
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = img.width;
  canvas.height = img.height;
  ctx.drawImage(img, 0, 0);

  let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  let data = imageData.data;

  // trắng đen
  for (let i = 0; i < data.length; i += 4) {
    let gray = (data[i] + data[i+1] + data[i+2]) / 3;
    let val = gray > 140 ? 255 : 0;
    data[i] = data[i+1] = data[i+2] = val;
  }
  ctx.putImageData(imageData, 0, 0);

  // đếm pixel đen theo cột
  let colSum = new Array(canvas.width).fill(0);

  for (let x = 0; x < canvas.width; x++) {
    for (let y = 0; y < canvas.height; y++) {
      let i = (y * canvas.width + x) * 4;
      if (data[i] === 0) colSum[x]++;
    }
  }

  let max = Math.max(...colSum);
  let threshold = max * 0.5;

  let start = 0, end = canvas.width;

  for (let i = 0; i < colSum.length; i++) {
    if (colSum[i] > threshold) {
      start = i;
      break;
    }
  }

  for (let i = colSum.length - 1; i >= 0; i--) {
    if (colSum[i] > threshold) {
      end = i;
      break;
    }
  }

  let padding = 10;
  start = Math.max(0, start - padding);
  end = Math.min(canvas.width, end + padding);

  let w = end - start;
  let h = canvas.height;

  const cropCanvas = document.createElement("canvas");
  cropCanvas.width = w;
  cropCanvas.height = h;

  cropCanvas.getContext("2d")
    .drawImage(canvas, start, 0, w, h, 0, 0, w, h);

  return cropCanvas;
}

// OCR
async function runOCR() {
  const files = document.getElementById("upload").files;

  if (!files.length) {
    alert("Chọn ảnh trước 😏");
    return;
  }

  if (files.length > 150) {
    alert("Tối đa 150 ảnh thôi");
    return;
  }

  let allNumbers = [];
  const output = document.getElementById("output");

  for (let i = 0; i < files.length; i++) {
    output.value = `Đang xử lý ${i+1}/${files.length}...`;

    const img = await loadImage(files[i]);
    const canvas = cropMiddle(img);

    const { data } = await Tesseract.recognize(
      canvas,
      'eng',
      {
        tessedit_char_whitelist: '0123456789'
      }
    );

    let lines = data.text.split('\n');

    lines.forEach(line => {
      let nums = line.match(/\d/g);
      if (nums && nums.length === 1) {
        allNumbers.push(nums[0]);
      }
    });
  }

  // đảo từ dưới lên
  allNumbers.reverse();

  // cảnh báo sai
  if (allNumbers.length % 10 !== 0) {
    console.warn("Có thể OCR sai hoặc thiếu số");
  }

  // chia 10 số
  let finalText = '';
  for (let i = 0; i < allNumbers.length; i += 10) {
    finalText += allNumbers.slice(i, i + 10).join('') + '\n';
  }

  output.value = finalText.trim();
}

// tải txt
function downloadTxt() {
  const text = document.getElementById("output").value;
  const blob = new Blob([text], { type: 'text/plain' });

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "ketqua.txt";
  a.click();
}

</script>

</body>
</html>
